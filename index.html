<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pessoa   CRUD</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/scripts_pessoas.js" defer></script>
</head>
<body>
    <div id="geral">
    <h3>Cadastro aluno</h3>

    <div id="div-regras">
        <p>Pessoas menor de IDADE ou renda menor ou IGUAL a R$ 1700,00 - 
            Isentas de Desconto</p>
        <p> De R$ 1701,00 até 5000,00 - Desconto de 5%</p>
        <p> De R$ 5001,00 até 8001,00 - Desconto de 10%</p>
        <p> De R$ 8001,00 até 12000,00 - Desconto de 15% </p>
        <p> Acima de R$ 12000,00 - Desconto de 20% </p>
    </div>

    <div id="form-pessoa">
        <form id="form-pessoa">
            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome">

            <label for="idade">Idade</label>
            <input type="text" name="Idade" id="idade">

            <label for="renda">Renda</label>
            <input type="text" name="renda" id="renda">

            <button type="submit" id="btn-add"> Adicionar </button>
            <button type="reset" id="btn-limpar"> Limpar </button>
        </form>

    </div>

    <div id="div-lista-pessoas">

    </div>
    
    </div>
    
</body>
</html>
